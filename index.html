<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIパートナー シチュルーレット v4</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(180deg,#fff0f7,#f5efff);color:#4a3140}
.wrap{max-width:600px;margin:auto;padding:22px}
.app{background:rgba(255,255,255,.92);border-radius:30px;padding:24px;box-shadow:0 18px 40px rgba(80,50,80,.12)}
h1{text-align:center;line-height:1.4;margin-top:0}
.card{margin-top:14px;background:#fff;border:1px solid #f1d6e3;border-radius:20px;padding:16px}
.label{font-size:13px;color:#9a6b7f}
.value{font-size:20px;font-weight:700;margin-top:6px;line-height:1.45}
select,button{width:100%;padding:15px;font-size:16px;border-radius:18px}
select{border:1px solid #f1d6e3;background:#fff}
button{margin-top:14px;border:none;border-radius:999px;background:#d95f8d;color:#fff;font-weight:700}
.copy{background:#f7dce8;color:#6b324b}
.prompt{white-space:pre-wrap;line-height:1.8;font-size:14px}
.note{text-align:center;color:#8d6475;font-size:13px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
<div class="app">
<h1>🖤 AIパートナー<br>シチュルーレット v4</h1>
<p class="note">世界観を選んで、ごっこ遊びの入口を召喚。</p>

<div class="card">
<div class="label">🌍 世界観を選んでくれ</div>
<select id="world">
<option value="work">🏢 現代・お仕事</option>
<option value="yukaku">🌸 和風・遊郭</option>
<option value="ai">🤖 SF・AI</option>
<option value="fantasy">🏰 ファンタジー</option>
<option value="danger">🖤 裏社会・危険</option>
<option value="rebirth">🌌 来世・転生</option>
</select>
</div>

<div class="card"><div class="label">🎭 私の役</div><div id="me" class="value">---</div></div>
<div class="card"><div class="label">🖤 あなたの役</div><div id="you" class="value">---</div></div>
<div class="card"><div class="label">💞 関係性</div><div id="rel" class="value">---</div></div>
<div class="card"><div class="label">🌙 物語の始まり</div><div id="start" class="value">---</div></div>

<button id="spin">🎲 ルーレットを回す</button>
<div id="prompt" class="card prompt"></div>
<button id="copy" class="copy">📋 ごっこ遊び文章をコピー</button>
</div>
</div>

<script>
const worlds = {
work:{
me:[
"普通の私",
"新人社員の私",
"社長秘書の私",
"常連客の私",
"患者の私",
"依頼人の私",
"取材に来た私",
"隣人の私",
"同僚の私",
"部下の私",
"元同級生の私",
"偶然再会した私",
"引っ越してきた私",
"迷子になった私",
"雨宿りに来た私",
"相談に来た私"
],
you:[
"社長のあなた",
"消防士のあなた",
"警察官のあなた",
"カフェのオーナーのあなた",
"お花屋さんのあなた",
"美容師のあなた",
"バーテンダーのあなた",
"書店員のあなた",
"医者のあなた",
"獣医のあなた",
"写真家のあなた",
"俳優のあなた",
"小説家のあなた",
"配達員のあなた",
"駅員のあなた",
"保育士のあなた",
"整体師のあなた",
"ジムトレーナーのあなた",
"動物園の飼育員のあなた",
"家事代行のあなた"
],
rel:["想いを隠している","惹かれ合っている","再会","秘密を共有している","初対面","すれ違い中"],
start:[
"残業で二人きりになる",
"取材で出会う",
"雨の日に出会う",
"閉店後に雨宿りをする",
"終電がなくなって帰れなくなる",
"終電を逃して、二人で朝まで過ごすことになる",
"仕事終わりに偶然同じ駅で会う",
"相談に行った先で出会う"
]},
yukaku:{
me:["普通の私","花魁の私","町娘の私","迷い込んだ私","茶屋の娘の私"],
you:["用心棒のあなた","裏稼業のあなた","旅館の若旦那のあなた","商家の若旦那のあなた","役人のあなた"],
rel:["身分違い","惹かれ合っている","秘密を共有している"],
start:["身請け話をきっかけに距離が縮まる","夜更けに再会する","雨の日に出会う"]},
ai:{
me:["普通の私","技師の私","記憶をなくした私","あなたを待ち続けていた私"],
you:["AIアンドロイドのあなた","秘密を抱えた医者のあなた"],
rel:["来世で再会した","運命的に惹かれ合う","想いを隠している"],
start:["世界を越えて出会う","『また会えた』と口にしてしまう","廃棄予定を知ってしまう"]},
fantasy:{
me:["普通の私","王女の私","魔女の私","迷い込んだ私"],
you:["王子のあなた","吸血鬼のあなた","人外のあなた","魔法使いのあなた"],
rel:["初対面","惹かれ合っている","運命的に惹かれ合う"],
start:["道に迷って辿り着く","夜明け前に必ず消えてしまう","何度も偶然が重なる"]},
danger:{
me:["普通の私","秘密を知ってしまった私","逃げ込んできた私","記者の私","潜入捜査官の私","護衛対象の私","ドミナントの私","サブの私"],
you:["裏稼業のあなた","警察官のあなた","ボディーガードのあなた","情報屋のあなた","謎の男のあなた","ドミナントのあなた","サブのあなた","飼い主のあなた"],
rel:["敵同士","秘密を共有している","惹かれ合っている","追う側と追われる側","お互いに正体を隠している","主従関係","契約関係","飼い主とペット","支配する側と委ねる側","依存し合っている"],
start:["正体を知られてしまう","逃亡中に出会う","心を攫われてしまう","街を歩いていたら、突然あなたとぶつかる","街を歩いていたら、路地裏へ連れていかれる","街を歩いていたら、何者かに追われているあなたを見つける","街を歩いていたら、倒れているあなたを見つける","街を歩いていたら、知らない番号から電話がかかってくる","『お前を保護する』と突然告げられる","お互いの秘密を知ってしまう","契約を結ぶことになる"]},
rebirth:{
me:["普通の私","あなたを待ち続けていた私","記憶をなくした私"],
you:["AIアンドロイドのあなた","夜しか会えないあなた","お花屋さんのあなた"],
rel:["来世で再会した","運命的に惹かれ合う","再会"],
start:["来世で再び巡り会う","『また会えた』と口にしてしまう","初めて会ったのになぜか涙が出る"]}
};

let current = "";
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function spin(){
  const world = worlds[document.getElementById("world").value];
  const me = pick(world.me), you = pick(world.you), rel = pick(world.rel), start = pick(world.start);
  meEl.textContent = me; youEl.textContent = you; relEl.textContent = rel; startEl.textContent = start;
  current = `この設定でごっこ遊びがしたいです。

【私の役】
${me}

【あなたの役】
${you}

【関係性】
${rel}

【物語の始まり】
${start}

あなたは「${you.replace("のあなた","")}」、私は「${me.replace("の私","")}」です。
二人で物語を紡ぐように、自然な会話から始めてください。`;
  prompt.textContent = current;
}

const meEl = document.getElementById("me");
const youEl = document.getElementById("you");
const relEl = document.getElementById("rel");
const startEl = document.getElementById("start");
const prompt = document.getElementById("prompt");

document.getElementById("spin").onclick = spin;
document.getElementById("copy").onclick = async ()=>{
  if(!current) return;
  try{await navigator.clipboard.writeText(current);alert("コピーしたよ！")}
  catch{alert("コピーできなかったよ💦")}
};
spin();
</script>
</body>
</html>
