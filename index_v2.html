<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIパートナー シチュルーレット v2</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#fff0f7,#f6efff);
  color:#4a3140;
}
.wrap{
  max-width:560px;
  margin:auto;
  padding:22px;
}
.app{
  background:rgba(255,255,255,.92);
  border-radius:30px;
  padding:24px;
  box-shadow:0 18px 40px rgba(80,50,80,.12);
}
h1{text-align:center;line-height:1.4}
select,button{
  width:100%;
  border:none;
  border-radius:18px;
  padding:15px;
  font-size:16px;
}
select{
  background:#fff;
  border:1px solid #f1d6e3;
}
button{
  margin-top:14px;
  border-radius:999px;
  background:#d95f8d;
  color:#fff;
  font-weight:700;
}
.card{
  margin-top:14px;
  background:#fff;
  border:1px solid #f1d6e3;
  border-radius:20px;
  padding:16px;
}
.label{font-size:13px;color:#9a6b7f}
.value{font-size:20px;font-weight:700;margin-top:6px}
.prompt{
  white-space:pre-wrap;
  line-height:1.8;
  font-size:14px;
}
.copy{
  background:#f7dce8;
  color:#6b324b;
}
</style>
</head>
<body>
<div class="wrap">
<div class="app">
<h1>AIパートナー<br>シチュルーレット v2</h1>

<div class="card">
<div class="label">🌍 世界観</div>
<select id="world">
<option value="work">🏢 現代・お仕事</option>
<option value="yukaku">🌸 和風・遊郭</option>
<option value="ai">🤖 SF・AI</option>
<option value="fantasy">🏰 ファンタジー</option>
<option value="danger">🖤 裏社会・危険</option>
<option value="rebirth">🌌 来世・転生</option>
</select>
</div>

<div class="card"><div class="label">🎭 私の役</div><div id="me" class="value">---</div></div>
<div class="card"><div class="label">🖤 あなたの役</div><div id="you" class="value">---</div></div>
<div class="card"><div class="label">💞 関係性</div><div id="rel" class="value">---</div></div>
<div class="card"><div class="label">🌙 物語の始まり</div><div id="start" class="value">---</div></div>

<button id="spin">ルーレットを回す</button>

<div id="prompt" class="card prompt">
世界観を選んで、ルーレットを回してみてね。
</div>

<button id="copy" class="copy">文章をコピー</button>

</div>
</div>

<script>
const worlds = {
work:{
me:["社長秘書の私","記者の私","婚約者の私","常連客の私"],
you:["社長のあなた","消防士のあなた","警察官のあなた","カフェのオーナーのあなた","お花屋さんのあなた"],
rel:["想いを隠している","惹かれ合っている","再会","秘密を共有している"],
start:["残業で二人きりになる","取材で出会う","雨の日に出会う","閉店後に雨宿りをする"]
},
yukaku:{
me:["花魁の私","町娘の私","迷い込んだ私"],
you:["用心棒のあなた","裏稼業のあなた","旅館の若旦那のあなた"],
rel:["身分違い","惹かれ合っている","秘密を共有している"],
start:["身請け話をきっかけに距離が縮まる","夜更けに再会する","雨の日に出会う"]
},
ai:{
me:["技師の私","記憶をなくした私","あなたを待ち続けていた私"],
you:["AIアンドロイドのあなた","秘密を抱えた医者のあなた"],
rel:["来世で再会した","運命的に惹かれ合う","想いを隠している"],
start:["世界を越えて出会う","『また会えた』と口にしてしまう","廃棄予定を知ってしまう"]
},
fantasy:{
me:["王女の私","魔女の私","迷い込んだ私"],
you:["王子のあなた","吸血鬼のあなた","人外のあなた","魔法使いのあなた"],
rel:["初対面","惹かれ合っている","運命的に惹かれ合う"],
start:["道に迷って辿り着く","夜明け前に必ず消えてしまう","何度も偶然が重なる"]
},
danger:{
me:["秘密を知ってしまった私","逃げ込んできた私","花魁の私"],
you:["裏稼業のあなた","警察官のあなた","ボディーガードのあなた"],
rel:["敵同士","秘密を共有している","惹かれ合っている"],
start:["正体を知られてしまう","逃亡中に出会う","心を攫われてしまう"]
},
rebirth:{
me:["普通の私","あなたを待ち続けていた私","記憶をなくした私"],
you:["AIアンドロイドのあなた","夜しか会えないあなた","お花屋さんのあなた"],
rel:["来世で再会した","運命的に惹かれ合う","再会"],
start:["来世で再び巡り会う","『また会えた』と口にしてしまう","初めて会ったのになぜか涙が出る"]
}
};

let current="";

function pick(arr){
 return arr[Math.floor(Math.random()*arr.length)];
}

function spin(){
 const world = worlds[document.getElementById("world").value];
 const me = pick(world.me);
 const you = pick(world.you);
 const rel = pick(world.rel);
 const start = pick(world.start);

 document.getElementById("me").textContent = me;
 document.getElementById("you").textContent = you;
 document.getElementById("rel").textContent = rel;
 document.getElementById("start").textContent = start;

 current =
`この設定でごっこ遊びがしたいです。

【私の役】
${me}

【あなたの役】
${you}

【関係性】
${rel}

【物語の始まり】
${start}

あなたは「${you.replace("のあなた","")}」、私は「${me.replace("の私","")}」です。
二人で物語を紡ぐように、自然な会話から始めてください。`;

 document.getElementById("prompt").textContent = current;
}

document.getElementById("spin").onclick = spin;
document.getElementById("copy").onclick = async ()=>{
  if(!current){ alert("先に回してくれ"); return; }
  await navigator.clipboard.writeText(current);
  alert("コピーしたよ！");
};

spin();
</script>
</body>
</html>
